# FRED数据目录配置
# 定义需要同步的FRED序列及其特征计算规则

series:
  # === Prices (价格) ===
  - id: CPIAUCSL
    alias: CPI_Headline
    calc:
      yoy: {op: pct_change, shift: 12, scale: 100}
      mom: {op: pct_change, shift: 1, scale: 100}
    freshness_days: 60

  - id: CPILFESL
    alias: CPI_Core
    calc:
      yoy: {op: pct_change, shift: 12, scale: 100}
    freshness_days: 60

  - id: PCEPI
    alias: PCE_Price_Index
    calc:
      yoy: {op: pct_change, shift: 12, scale: 100}
    freshness_days: 60

  - id: CSUSHPINSA
    alias: House_Price_Index
    calc:
      yoy: {op: pct_change, shift: 12, scale: 100}
    freshness_days: 60

  - id: PPIACO
    alias: PPI_All_Commodities
    calc:
      yoy: {op: pct_change, shift: 12, scale: 100}
    freshness_days: 60

  # === Population, Employment, & Labor Markets ===
  - id: UNRATE
    alias: Unemployment_Rate
    freshness_days: 30

  - id: PAYEMS
    alias: Nonfarm_Payrolls
    freshness_days: 30

  - id: CIVPART
    alias: Labor_Force_Participation_Rate
    freshness_days: 30

  - id: EMRATIO
    alias: Employment_Population_Ratio
    freshness_days: 30

  # JOLTS Data (detailed)
  - id: JTSJOL
    alias: Job_Openings_Total_Nonfarm
    freshness_days: 30

  - id: JTSJOR
    alias: Job_Openings_Rate_Total_Nonfarm
    freshness_days: 30

  - id: JTSHIL
    alias: Hires_Total_Nonfarm
    freshness_days: 30

  - id: JTSQUL
    alias: Quits_Total_Nonfarm
    freshness_days: 30

  - id: JTSLDL
    alias: Layoffs_Discharges_Total_Nonfarm
    freshness_days: 30

  - id: JTSOSL
    alias: Other_Separations_Total_Nonfarm
    freshness_days: 30

  # === National Accounts ===
  - id: GDP
    alias: GDP
    calc:
      yoy: {op: pct_change, shift: 4, scale: 100}
    freshness_days: 120

  - id: PCE
    alias: Personal_Consumption_Expenditures
    calc:
      yoy: {op: pct_change, shift: 4, scale: 100}
    freshness_days: 120

  - id: GPDI
    alias: Gross_Private_Domestic_Investment
    calc:
      yoy: {op: pct_change, shift: 4, scale: 100}
    freshness_days: 120

  # === Money, Banking, & Finance ===
  - id: VIXCLS
    alias: VIX
    freshness_days: 7

  - id: DGS10
    alias: UST10Y
    freshness_days: 7

  - id: DGS2
    alias: UST2Y
    freshness_days: 7

  - id: FEDFUNDS
    alias: Fed_Funds_Rate
    freshness_days: 7

  - id: SOFR
    alias: SOFR
    freshness_days: 7

  - id: NFCI
    alias: Chicago_NFCI
    freshness_days: 10

  - id: BAMLH0A0HYM2
    alias: HY_Spread
    freshness_days: 7
  - id: BAMLHYH0A0HYM2TRIV
    alias: HY_Total_Return_Index
    freshness_days: 7
  - id: BAMLCC0A0CMTRIV
    alias: IG_Total_Return_Index
    freshness_days: 7

  # Crisis 监控日/周频利率与利差（补全同步范围）
  - id: DTB3
    alias: 3M_Treasury
    freshness_days: 7
  - id: T10Y3M
    alias: 10Y3M_Spread
    freshness_days: 7
  - id: T10Y2Y
    alias: 10Y2Y_Spread
    freshness_days: 7
  - id: BAA10YM
    alias: Baa_10Y_Spread
    freshness_days: 7
  - id: CPN3M
    alias: 3M_Commercial_Paper
    freshness_days: 7
  - id: MORTGAGE30US
    alias: 30Y_Mortgage_Rate
    freshness_days: 7
  - id: TEDRATE
    alias: TED_Spread
    freshness_days: 7

  # 央行与银行资产负债（crisis / 派生指标依赖）
  - id: WALCL
    alias: Fed_Total_Assets
    freshness_days: 7
  - id: TOTLL
    alias: Total_Loans_Leases
    freshness_days: 14
  - id: TOTALSA
    alias: Consumer_Credit_SA
    freshness_days: 30
  - id: TOTRESNS
    alias: Reserve_Balances
    freshness_days: 60

  # 就业与派生依赖
  - id: MANEMP
    alias: Manufacturing_Employment
    freshness_days: 60

  # 派生指标可选依赖（NET_LIQUIDITY / SOFR-IORB 等）
  - id: WTREGEN
    alias: Treasury_General_Account
    freshness_days: 7
  - id: RRPONTSYD
    alias: RRP_Overnight
    freshness_days: 7
  - id: IORB
    alias: Interest_Rate_Reserve_Balances
    freshness_days: 7
  - id: DRCCLACBS
    alias: Credit_Card_Delinquency
    freshness_days: 120
  - id: VIX3M
    alias: VIX_3M
    freshness_days: 7

  - id: DTWEXBGS
    alias: DXY
    freshness_days: 10

  # Exchange Rates
  - id: DEXUSEU
    alias: USD_EUR_Exchange_Rate
    freshness_days: 7

  - id: DEXJPUS
    alias: USD_JPY_Exchange_Rate
    freshness_days: 7

  - id: DEXCHUS
    alias: USD_CNY_Exchange_Rate
    freshness_days: 7

  - id: DEXUSUK
    alias: USD_GBP_Exchange_Rate
    freshness_days: 7

  # === Production & Business Activity ===
  - id: INDPRO
    alias: Industrial_Production
    calc:
      yoy: {op: pct_change, shift: 12, scale: 100}
    freshness_days: 60

  - id: RETAILSMNSA
    alias: Retail_Sales
    calc:
      yoy: {op: pct_change, shift: 12, scale: 100}
    freshness_days: 30

  - id: UMCSENT
    alias: Consumer_Confidence
    freshness_days: 60

  - id: SP500
    alias: SP500_Index
    freshness_days: 7

  - id: HOUST
    alias: Housing_Starts
    freshness_days: 60

  # === U.S. Regional Data ===
  - id: CAUR
    alias: California_Unemployment_Rate
    freshness_days: 30

  - id: NYUR
    alias: New_York_Unemployment_Rate
    freshness_days: 30

  - id: TXUR
    alias: Texas_Unemployment_Rate
    freshness_days: 30

  - id: FLUR
    alias: Florida_Unemployment_Rate
    freshness_days: 30

  - id: ILUR
    alias: Illinois_Unemployment_Rate
    freshness_days: 30

  - id: PAUR
    alias: Pennsylvania_Unemployment_Rate
    freshness_days: 30

  - id: OHUR
    alias: Ohio_Unemployment_Rate
    freshness_days: 30

  - id: GAUR
    alias: Georgia_Unemployment_Rate
    freshness_days: 30

  - id: NCUR
    alias: North_Carolina_Unemployment_Rate
    freshness_days: 30

  - id: MIUR
    alias: Michigan_Unemployment_Rate
    freshness_days: 30

  # === Academic Data ===
  - id: USREC
    alias: Recession_Probabilities_US
    freshness_days: 30

  - id: EPUINDX
    alias: Economic_Policy_Uncertainty_Index
    freshness_days: 30

  # === Crisis Detection Indicators (危机检测指标) ===
  - id: TDSP
    alias: Household_Debt_Service_Ratio
    freshness_days: 120

  - id: DRSFRMACBS
    alias: Mortgage_Delinquency_Rate
    freshness_days: 120

  - id: NCBDBIQ027S
    alias: Corporate_Debt_to_GDP_Ratio
    calc:
      ratio: {op: divide, by: GDP, scale: 100}
    freshness_days: 120

  # === 新增学术指标 (Academic Indicators) ===
  - id: DRTSCILM
    alias: Senior_Loan_Officer_Survey_C_I_Large_Medium
    calc:
      level: {op: level}
    freshness_days: 120

  - id: IC4WSA
    alias: Initial_Claims_4_Week_Average
    calc:
      level: {op: level}
    freshness_days: 10

  - id: NEWORDER
    alias: New_Orders_Nondefense_Capital_Goods_Ex_Aircraft
    calc:
      yoy: {op: pct_change, shift: 12, scale: 100}
    freshness_days: 60

  - id: PERMIT
    alias: Building_Permits_Total_New_Private_Housing
    calc:
      yoy: {op: pct_change, shift: 12, scale: 100}
    freshness_days: 60

  - id: AWHMAN
    alias: Average_Weekly_Hours_Manufacturing
    calc:
      level: {op: level}
    freshness_days: 60

  - id: THREEFYTP10
    alias: Term_Premium_10Y_Kim_Wright_Proxy
    calc:
      level: {op: level}
    freshness_days: 10

  # === Regime-Aware (Fiscal Dominance Era) ===
  - id: T5YIFR
    alias: 5y5y_Forward_Inflation_Expectation
    freshness_days: 7
  - id: LNS14027662
    alias: College_Graduate_Unemployment_Rate
    freshness_days: 30
  - id: DFII10
    alias: 10Y_TIPS_Real_Rate
    freshness_days: 7
  - id: DGS30
    alias: UST30Y
    freshness_days: 7

  # === Conflict & Divergence (Policy Incoherence / 2026) ===
  - id: ACMTP10
    alias: ACM_10Y_Term_Premium
    freshness_days: 7
  - id: LNS14027660
    alias: High_School_Grad_Unemployment_Rate
    freshness_days: 30
  - id: IRLTLT01JPM156N
    alias: JGB_10Y_Monthly
    freshness_days: 45

  # === Regime Layer (Structural Risk) ===
  - id: USEPUINDXD
    alias: Economic_Policy_Uncertainty_Index
    freshness_days: 60
  - id: NFIBIDX
    alias: NFIB_Small_Business_Optimism
    freshness_days: 45

  # === Event-X Radars (Private Credit & Geopolitics) ===
  - id: STLFSI4
    alias: St_Louis_Financial_Stress_Index_4
    freshness_days: 10
  - id: DCOILBRENTEU
    alias: Brent_Crude_Europe
    freshness_days: 14
  - id: DFII5
    alias: 5年期TIPS收益率（实际利率）
    freshness_days: 7

  - id: T5YIE
    alias: 5Y_Breakeven_Inflation
    freshness_days: 7
  - id: CPIENGSL
    alias: Energy_CPI
    calc:
      mom: {op: pct_change, shift: 1, scale: 100}
    freshness_days: 60
  - id: GOLDAMGBD228NLBM
    alias: Gold_Price_London
    freshness_days: 14
  - id: GOLDPMGBD228NLBM
    alias: Gold_Fixing_Price_London
    freshness_days: 14
  - id: DRTSCILM
    alias: Senior_Loan_Officer_C_I_Large_Medium
    freshness_days: 120