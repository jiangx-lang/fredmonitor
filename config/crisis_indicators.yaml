# config/crisis_indicators.yaml - 优化后的40个指标配置
# 按照用户建议：解决高相关性、重复计算问题，权重总计100%
# 新增学术指标：SLOOS、初请、新订单、建筑许可、工时、期限溢价

scoring:
  bands:
    low: 40
    med: 60
    high: 80
  momentum_bonus_max: 5
  momentum_days: [1, 5]
  co_move_threshold_pct: 0.9
  co_move_bonus_per_bucket: 5
  deprecated_series:
    - TEDRATE

indicators:
  # ===== 核心预警指标 (40%) =====
  
  # 收益率曲线 (14%)
  - id: T10Y3M
    name: "收益率曲线倒挂: 10年期-3个月"
    group: core_warning
    transform: none
    higher_is_risk: false
    compare_to: noncrisis_p25
    weight: 0.08
    freq: D

  - id: T10Y2Y
    name: "收益率曲线倒挂: 10年期-2年期"
    group: core_warning
    transform: none
    higher_is_risk: false
    compare_to: noncrisis_p25
    weight: 0.06
    freq: D

  - id: UST30Y_UST2Y_RSI
    name: "30年/2年美债利差 RSI"
    group: core_warning
    transform: level
    higher_is_risk: true
    compare_to: constant_50
    weight: 0.15
    freq: D

  - id: VIX_TERM_STRUCTURE
    name: "VIX 期限结构 (VIX/VIX3M)"
    group: core_warning
    transform: level
    higher_is_risk: true
    compare_to: noncrisis_p75
    weight: 0.03
    freq: D

  - id: HYG_LQD_RATIO
    name: "信用风险偏好 (HYG/LQD)"
    group: core_warning
    transform: zscore
    higher_is_risk: false
    compare_to: constant_-0.5
    weight: 0.02
    freq: D
    use_velocity: true
    velocity_mode: pct

  - id: DXY_CHANGE
    name: "美元指数5日变化 (DXY/UUP)"
    group: core_warning
    transform: none
    higher_is_risk: true
    compare_to: constant_1.0
    weight: 0.02
    freq: D
    use_velocity: true
    velocity_mode: pct

  - id: KRE_SPY_RATIO
    name: "区域银行相对强度 (KRE/SPY)"
    group: core_warning
    transform: zscore
    higher_is_risk: false
    compare_to: constant_-0.5
    weight: 0.02
    freq: D
    use_velocity: true
    velocity_mode: pct

  - id: XLF_SPY_RATIO
    name: "金融板块相对强度 (XLF/SPY)"
    group: core_warning
    transform: none
    higher_is_risk: false
    compare_to: noncrisis_p25
