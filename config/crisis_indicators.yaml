    transform: none
    higher_is_risk: true
    compare_to: crisis_median
    weight: 0.03  # 减少2%
    freq: D

  - id: CP_MINUS_DTB3
    name: "商业票据-3个月国债利差"
    group: core_warning
    transform: none
    higher_is_risk: true
    compare_to: crisis_median
    weight: 0.04
    freq: D

  - id: SOFR20DMA_MINUS_DTB3
    name: "SOFR(20日均值)-3个月国债利差"
    group: core_warning
