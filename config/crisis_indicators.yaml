# config/crisis_indicators.yaml - 优化后的40个指标配置
# 按照用户建议：解决高相关性、重复计算问题，权重总计100%
# 新增学术指标：SLOOS、初请、新订单、建筑许可、工时、期限溢价

scoring:
  bands:
    low: 40
    med: 60
    high: 80
  momentum_bonus_max: 5
  momentum_days: [1, 5]
  co_move_threshold_pct: 0.9
  co_move_bonus_per_bucket: 5
  # v2.0: 动量评分权重配置
  momentum_weight: 0.3  # 动量评分权重（0.3 = 30%）
  level_weight: 0.7     # 水平评分权重（0.7 = 70%）
  # v2.0: 持续时间乘数
  persistence_months: 3  # 持续高风险月数阈值
  persistence_multiplier: 1.1  # 持续高风险时的乘数
  # v2.0: 共振检测配置
  resonance_threshold: 80  # 触发共振的高风险阈值
  systemic_risk_multiplier: 1.2  # 系统性风险乘数

indicators:
  # ===== 核心预警指标 (40%) =====
  
  # 收益率曲线 (14%)
  - id: T10Y3M
    name: "收益率曲线倒挂: 10年期-3个月"
    group: core_warning
    type: leading  # v2.0: 指标类型 (leading/coincident/lagging)
    transform: none
    higher_is_risk: false
    compare_to: noncrisis_p25
    weight: 0.08
    freq: D
    momentum_window: 3  # v2.0: 动量计算窗口（月）
    invert_momentum: false  # v2.0: 是否反转动量（快速下降为风险）

  - id: T10Y2Y
    name: "收益率曲线倒挂: 10年期-2年期"
    group: core_warning
    type: leading  # v2.0: 指标类型
    transform: none
    higher_is_risk: false
    compare_to: noncrisis_p25
    weight: 0.06
    freq: D
    momentum_window: 3
    invert_momentum: false

  # 信用利差簇 (18%) - 减少3%给EBP
  - id: BAMLH0A0HYM2
    name: "高收益债风险溢价"
    group: core_warning
    transform: none
    higher_is_risk: true
    compare_to: crisis_median
    weight: 0.05
    freq: D

  - id: BAA10YM
    name: "投资级信用利差: Baa-10Y国债"
    group: core_warning
    transform: none
    higher_is_risk: true
