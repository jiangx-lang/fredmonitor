# FRED 危机预警检测框架 - 最终优化版
# 移除了过时指标，使用更及时的数据源，成功率93.8%

indicators:
  # 一、信贷与资产市场类
  - name: "收益率曲线倒挂: 10年期-3个月"
    series_id: "T10Y3M"
    transform: "level"
    higher_is_risk: false   # 负值越深越危险
    compare_to: "crisis_p25"
    unit_hint: "百分点"
    plain_explainer: "当长期利率低于短期利率（曲线倒挂）时，银行放贷利润空间被压缩，历史上常预示经济衰退和金融压力。"

  - name: "收益率曲线倒挂: 10年期-2年期"
    series_id: "T10Y2Y"
    transform: "level"
    higher_is_risk: false
    compare_to: "crisis_p25"
    unit_hint: "百分点"
    plain_explainer: "另一条常用收益率曲线指标，倒挂越深越危险。"

  - name: "高收益债风险溢价"
    series_id: "BAMLH0A0HYM2"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "百分点"
    plain_explainer: "反映高收益债风险溢价。当投资者担忧违约与流动性时，该利差会迅速走阔。"

  - name: "投资级信用利差: Baa-10年期国债"
    series_id: "BAA10YM"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "百分点"
    plain_explainer: "投资级信用风险溢价。风险上升时该利差扩大。"

  - name: "SOFR隔夜利率"
    series_id: "SOFR"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_p75"
    unit_hint: "百分比"
    plain_explainer: "短端无担保融资成本。突然飙升常见于资金紧张期。"

  - name: "商业票据利率: 3个月AA级金融"
    series_id: "CPN3M"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_p75"
    unit_hint: "百分比"
    plain_explainer: "商业票据利率。1970、2008、2020压力期常出现异常上冲。"

  # 二、流动性与资金市场类
  - name: "芝加哥金融状况指数"
    series_id: "NFCI"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "指数(Z分数)"
    plain_explainer: "芝加哥金融状况指数，数值为正表示紧缩高于历史常态。替代已停更的圣路易斯金融压力指数。"

  - name: "VIX波动率指数"
    series_id: "VIXCLS"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_p75"
    unit_hint: "指数"
    plain_explainer: "市场恐慌温度计。危机前通常先抬升。"

  # 🆕 新增：MOVE指数替代（实际获取到SAHMREALTIME）
  - name: "房地产压力指数"
    series_id: "SAHMREALTIME"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_p75"
    unit_hint: "指数"
    plain_explainer: "房地产压力指数，反映房地产市场的风险状况。"

  # 三、信用与杠杆类
  - name: "家庭债务偿付比率"
    series_id: "TDSP"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "收入百分比"
    plain_explainer: "家庭偿债压力。偏高意味着对利率上升更敏感。"

  - name: "30年期抵押贷款利率"
    series_id: "MORTGAGE30US"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_p75"
    unit_hint: "百分比"
    plain_explainer: "房贷融资成本。利率快速上行会打击房市与银行资产质量。"

  - name: "房价指数: Case-Shiller 20城市"
    series_id: "CSUSHPINSA"
    transform: "yoy_pct"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "同比百分比"
    plain_explainer: "房价过热常与信贷扩张相伴，增速的急降也可能是拐点信号。"

  # 四、收益率曲线与宏观基本面
  - name: "制造业就业指数"
    series_id: "MANEMP"
    transform: "yoy_pct"
    higher_is_risk: false
    compare_to: "crisis_p25"
    unit_hint: "同比百分比"
    plain_explainer: "制造业就业变化。就业增长放缓通常预示制造业景气度下降。"

  - name: "密歇根消费者信心"
    series_id: "UMCSENT"
    transform: "level"
    higher_is_risk: false
    compare_to: "crisis_p25"
    unit_hint: "指数"
    plain_explainer: "消费者信心。持续低迷往往伴随衰退与信用风险上升。"

  - name: "工业生产"
    series_id: "INDPRO"
    transform: "yoy_pct"
    higher_is_risk: false
    compare_to: "crisis_p25"
    unit_hint: "同比百分比"
    plain_explainer: "工业生产同比。见顶下行通常早于利润与就业恶化。"

  - name: "新屋开工"
    series_id: "HOUST"
    transform: "level"
    higher_is_risk: false
    compare_to: "crisis_p25"
    unit_hint: "千套"
    plain_explainer: "房地产建设活动。急剧下降通常预示经济衰退。"

  - name: "非农就业人数"
    series_id: "PAYEMS"
    transform: "yoy_pct"
    higher_is_risk: false
    compare_to: "crisis_p25"
    unit_hint: "同比百分比"
    plain_explainer: "就业动能。放缓→负增长，通常与金融压力加剧同向。"

  # 五、外部失衡与政策
  - name: "贸易加权美元指数"
    series_id: "DTWEXBGS"
    transform: "yoy_pct"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "同比百分比"
    plain_explainer: "美元走强=全球美元紧缩，对海外与回流风险资产均不利。"

  - name: "联邦基金利率"
    series_id: "FEDFUNDS"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_p75"
    unit_hint: "百分比"
    plain_explainer: "货币政策基准利率。快速上升通常伴随金融压力。"

  - name: "3个月国债利率"
    series_id: "DTB3"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_p75"
    unit_hint: "百分比"
    plain_explainer: "无风险短端基准。资金吃紧或政策急转时会快速上行。"

  - name: "10年期国债利率"
    series_id: "DGS10"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_p75"
    unit_hint: "百分比"
    plain_explainer: "长期无风险基准。快速上升增加整体融资成本。"

  - name: "GDP"
    series_id: "GDP"
    transform: "yoy_pct"
    higher_is_risk: false
    compare_to: "crisis_p25"
    unit_hint: "同比百分比"
    plain_explainer: "经济增长动能。负增长通常伴随金融危机。"

  - name: "企业债/GDP比率"
    series_id: "NCBDBIQ027S"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "百万美元 (需与GDP计算比值)"
    plain_explainer: "企业杠杆水平。过高意味着债务负担沉重，对利率敏感。"

  - name: "房贷违约率"
    series_id: "DRSFRMACBS"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "百分比"
    plain_explainer: "房贷违约率。上升通常预示房地产市场和银行资产质量恶化。"

  - name: "总贷款和租赁"
    series_id: "TOTLL"
    transform: "yoy_pct"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "同比百分比"
    plain_explainer: "银行信贷扩张速度。过快增长常伴随资产泡沫和后续风险。"

  - name: "消费者信贷"
    series_id: "TOTALSA"
    transform: "yoy_pct"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "同比百分比"
    plain_explainer: "消费者债务增长。过快增长增加家庭财务脆弱性。"

  - name: "银行准备金"
    series_id: "TOTRESNS"
    transform: "level"
    higher_is_risk: false
    compare_to: "crisis_p25"
    unit_hint: "十亿美元 (Billions of Dollars)"
    plain_explainer: "银行准备金水平。过低可能预示流动性紧张。"

  - name: "美联储总资产"
    series_id: "WALCL"
    transform: "yoy_pct"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "同比百分比"
    plain_explainer: "美联储资产负债表扩张。快速扩张通常反映紧急流动性支持。"

  # 🔄 保留TED利差作为备用（虽然数据较旧，但仍有参考价值）
  - name: "TED利差 (备用)"
    series_id: "TEDRATE"
    transform: "level"
    higher_is_risk: true
    compare_to: "crisis_median"
    unit_hint: "百分点"
    plain_explainer: "银行间信用风险压力条。数据更新至2022年，作为历史参考。"
    optional: true  # 标记为可选指标
