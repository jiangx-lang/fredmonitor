indicators:
  # === 强领先：金融早期信号 (45%) ===
  # 收益率曲线 (17%)
  - {id: T10Y3M,  name: "10Y-3M 利差",             group: rates_curve, transform: level,    higher_is_risk: false, compare_to: noncrisis_p25, weight: 0.10,  freq: D, role: score}
  - {id: T10Y2Y,  name: "10Y-2Y 利差",             group: rates_curve, transform: level,    higher_is_risk: false, compare_to: noncrisis_p25, weight: 0.07,  freq: D, role: score}
  
  # 信用利差簇 (22%)
  - {id: BAMLH0A0HYM2, name: "高收益债利差",      group: credit_spreads, transform: level, higher_is_risk: true,  compare_to: crisis_median,  weight: 0.07,  freq: D, role: score}
  - {id: BAA10YM, name: "IG: Baa-10Y",             group: credit_spreads, transform: level, higher_is_risk: true,  compare_to: crisis_median,  weight: 0.04,  freq: M, role: score}
  - {id: TEDRATE, name: "TED 利差",                 group: credit_spreads, transform: level, higher_is_risk: true,  compare_to: crisis_median,  weight: 0.04,  freq: D, role: score}
  - {id: CP_MINUS_DTB3, name: "CP-3M TBill",       group: credit_spreads, transform: level, higher_is_risk: true,  compare_to: crisis_median,  weight: 0.04,  freq: D, role: score}
  - {id: SOFR20DMA_MINUS_DTB3, name: "SOFR(20D)-3M TBill", group: credit_spreads, transform: level, higher_is_risk: true, compare_to: crisis_median, weight: 0.03, freq: D, role: score}
  
  # 金融条件 (6%)
  - {id: NFCI,    name: "芝加哥金融状况指数",       group: fin_cond_vol, transform: level,   higher_is_risk: true,  compare_to: noncrisis_p75,   weight: 0.06,  freq: W, role: score}

  # === 中短领先：实体与住房 (25%) ===
  # 就业与产出 (16%)
  - {id: PAYEMS,  name: "非农就业 YoY",            group: real_economy, transform: yoy_pct, higher_is_risk: false, compare_to: crisis_p25,      weight: 0.05,  freq: M, role: score}
  - {id: MANEMP,  name: "制造业就业 YoY",          group: real_economy, transform: yoy_pct, higher_is_risk: false, compare_to: crisis_p25,      weight: 0.02,  freq: M, role: score}
  - {id: INDPRO,  name: "工业生产 YoY",            group: real_economy, transform: yoy_pct, higher_is_risk: false, compare_to: crisis_p25,      weight: 0.05,  freq: M, role: score}
  - {id: GDP,     name: "GDP YoY",                 group: real_economy, transform: yoy_pct, higher_is_risk: false, compare_to: crisis_p25,      weight: 0.04,  freq: Q, role: score}
  
  # 住房链 (9%)
  - {id: HOUST,   name: "新屋开工 年化",           group: housing,       transform: level,   higher_is_risk: false, compare_to: crisis_p25,      weight: 0.05,  freq: M, role: score}
  - {id: CSUSHPINSA, name: "CS 20城房价 YoY",     group: housing,       transform: yoy_pct, higher_is_risk: true,  compare_to: noncrisis_p90,  weight: 0.04,  freq: M, role: score}

  # === 背景与政策水平 (15%) ===
  - {id: FEDFUNDS, name: "联邦基金利率",           group: rates_level,   transform: level,   higher_is_risk: true,  compare_to: noncrisis_p75,   weight: 0.030, freq: M, role: score}
  - {id: DGS10,    name: "10Y 国债利率",           group: rates_level,   transform: level,   higher_is_risk: true,  compare_to: noncrisis_p75,   weight: 0.025, freq: D, role: score}
  - {id: MORTGAGE30US, name: "30Y 按揭利率",      group: rates_level,   transform: level,   higher_is_risk: true,  compare_to: noncrisis_p75,   weight: 0.025, freq: W, role: score}
  - {id: SOFR,     name: "SOFR",                   group: rates_level,   transform: level,   higher_is_risk: true,  compare_to: noncrisis_p75,   weight: 0.020, freq: D, role: score}
  - {id: DTB3,     name: "3M 国债利率",            group: rates_level,   transform: level,   higher_is_risk: true,  compare_to: noncrisis_p75,   weight: 0.020, freq: D, role: score}
  - {id: CPN3M,    name: "3M 商业票据利率",        group: rates_level,   transform: level,   higher_is_risk: true,  compare_to: noncrisis_p75,   weight: 0.010, freq: D, role: score}
  - {id: WALCL,    name: "美联储总资产 YoY",       group: rates_level,   transform: yoy_pct, higher_is_risk: true,  compare_to: crisis_median,  weight: 0.020, freq: W, role: score}

  # === 银行与信贷 (10%) ===
  - {id: TOTLL,    name: "总贷款与租赁 YoY",       group: banking,       transform: yoy_pct, higher_is_risk: true,  compare_to: noncrisis_p75,  weight: 0.03,  freq: W, role: score}
  - {id: TOTALSA,  name: "消费者信贷 YoY",         group: banking,       transform: yoy_pct, higher_is_risk: true,  compare_to: noncrisis_p75,  weight: 0.03,  freq: M, role: score}
  - {id: TDSP,     name: "家庭债务偿付比率",       group: banking,       transform: level,   higher_is_risk: true,  compare_to: crisis_median,  weight: 0.02,  freq: Q, role: score}
  - {id: TOTRESNS, name: "银行准备金（规模或同比）", group: banking,     transform: level,   higher_is_risk: false, compare_to: noncrisis_p25,  weight: 0.02,  freq: M, role: score}

  # === 消费与杠杆/外部 (5%) ===
  - {id: UMCSENT,  name: "密歇根消费者信心",       group: consumers,     transform: level,   higher_is_risk: false, compare_to: noncrisis_p35,  weight: 0.02,  freq: M, role: score}
  - {id: NCBDBIQ027S, name: "企业债/GDP（新）",   group: leverage,      transform: level,   higher_is_risk: true,  compare_to: noncrisis_p65,  weight: 0.02,  freq: Q, role: score}
  - {id: DTWEXBGS, name: "贸易加权美元 YoY",      group: external,      transform: yoy_pct, higher_is_risk: true,  compare_to: noncrisis_median, weight: 0.01, freq: W, role: score}

  # === 监测项（不计分；展示在报告末尾） ===
  - {id: VIXCLS,   name: "VIX 波动率",            group: fin_cond_vol, transform: level,   higher_is_risk: true,  compare_to: noncrisis_p90,  weight: 0.0,   freq: D, role: monitor}
  - {id: STLFSI3,  name: "圣路易斯金融压力",      group: fin_cond_vol, transform: level,   higher_is_risk: true,  compare_to: noncrisis_p75,  weight: 0.0,   freq: W, role: monitor}
  - {id: DRSFRMACBS, name: "房贷违约率",         group: housing,       transform: level,   higher_is_risk: true,  compare_to: crisis_median,  weight: 0.0,   freq: Q, role: monitor}
  - {id: CORPDEBT_GDP_PCT, name: "企业债/GDP（旧）", group: leverage,   transform: level,   higher_is_risk: true,  compare_to: noncrisis_p65,  weight: 0.0,   freq: Q, role: monitor}
  - {id: RESERVES_ASSETS_PCT, name: "准备金/资产%", group: banking,     transform: level,   higher_is_risk: false, compare_to: noncrisis_p25,  weight: 0.0,   freq: Q, role: monitor}
  - {id: RESERVES_DEPOSITS_PCT, name: "准备金/存款%", group: banking,  transform: level,   higher_is_risk: false, compare_to: noncrisis_p25,  weight: 0.0,   freq: Q, role: monitor}