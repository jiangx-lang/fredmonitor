# FRED 高频风险敏感监控系统配置
# 每日生成灵敏度高的市场情绪与风险面板

risk_dashboard:
  lookback_years: 5
  buckets:
    - name: VolTerm
      weight: 0.30
      indicators:
        - {id: VIXCLS, label: VIX, direction: up_is_risk, freq: D}
        - {id: SKEW, label: SKEW, direction: up_is_risk, freq: D}
        - {id: T10Y3M, label: 10Y-3M, direction: down_is_risk, freq: D}
        - {id: T10Y2Y, label: 10Y-2Y, direction: down_is_risk, freq: D}
        - {id: MOVE_PROXY, label: MOVE_proxy, build: "|ΔDGS10|+|ΔDGS2|", direction: up_is_risk, freq: D}
    
    - name: Credit
      weight: 0.30
      indicators:
        - {id: BAMLH0A0HYM2, label: HY_OAS, direction: up_is_risk, freq: D}
        - {id: BAMLC0A0CM, label: IG_OAS, direction: up_is_risk, freq: D}
        - {id: TEDRATE, label: TED, direction: up_is_risk, freq: D}
        - {id: BAA10Y, label: BAA_10Y_Sprd, direction: up_is_risk, freq: D}
    
    - name: Liquidity
      weight: 0.20
      indicators:
        - {id: RRPONTSYD, label: ON_RRP, direction: tilt_change, freq: D, change_days: 5}
        - {id: WSHOMCB, label: Fed_Balance, direction: down_is_risk, freq: W}
        - {id: WTREGEN, label: TGA, direction: up_is_risk, freq: W}
        - {id: IORB_EFFR_SPRD, label: IORB-EFFR, build: "IORB-EFFR", direction: up_is_risk, freq: D}
    
    - name: RiskOnOff
      weight: 0.10
      indicators:
        - {id: DTWEXBGS, label: Broad_USD, direction: up_is_risk, freq: D}
        - {id: DCOILWTICO, label: WTI_abs_chg, direction: up_is_risk, freq: D, use_abs_change: true}
        - {id: GOLDAMGBD228NLBM, label: Gold, direction: up_is_risk, freq: D, with_vix_confirm: true}
        - {id: SPX_UTIL_RATIO, label: SPX/UTIL, build: "ratio", direction: down_is_risk, freq: D}
    
    - name: StressComposite
      weight: 0.10
      indicators:
        - {id: STLFSI2, label: STL_FSI, direction: up_is_risk, freq: W}
        - {id: NFCI, label: CHI_NFCI, direction: up_is_risk, freq: W}

  scoring:
    use_percentile: true
    percentile_window_years: 5
    momentum_days: [1, 5]
    momentum_bonus_max: 5
    co_move_bonus_per_bucket: 5
    co_move_threshold_pct: 0.9

  heatmap_thresholds:
    low: 35
    medium: 65
    high: 80

# 指标说明
indicator_descriptions:
  VIXCLS: "VIX波动率指数 - 市场恐慌情绪指标"
  SKEW: "SKEW指数 - 极端风险偏好指标"
  T10Y3M: "10年期-3个月国债利差 - 收益率曲线倒挂指标"
  T10Y2Y: "10年期-2年期国债利差 - 收益率曲线倒挂指标"
  BAMLH0A0HYM2: "高收益债券风险溢价 - 信用风险指标"
  BAMLC0A0CM: "投资级债券风险溢价 - 信用风险指标"
  TEDRATE: "TED利差 - 银行间信用风险指标"
  BAA10Y: "BAA级公司债与10年期国债利差"
  RRPONTSYD: "隔夜逆回购余额 - 流动性指标"
  WSHOMCB: "美联储总资产 - 货币政策指标"
  WTREGEN: "财政部TGA账户 - 流动性指标"
  DTWEXBGS: "贸易加权美元指数 - 全球流动性指标"
  DCOILWTICO: "WTI原油价格 - 大宗商品风险指标"
  GOLDAMGBD228NLBM: "黄金价格 - 避险情绪指标"
  STLFSI2: "圣路易斯金融压力指数 - 综合压力指标"
  NFCI: "芝加哥金融状况指数 - 综合状况指标"











